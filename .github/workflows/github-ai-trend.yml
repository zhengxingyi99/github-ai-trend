name: GitHub AI Trend Daily

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python github_ai_bot.py
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
