name: GitHub AI 趋势日报

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: 检出版本库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行主脚本
        run: python github_ai_bot.py
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
